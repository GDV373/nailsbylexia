{% extends "base.html" %}

{% block content %}

<style>
    .auth-card { border-radius: 24px; }
    .validation-message { font-size: 0.875rem; margin-top: 6px; }
    .valid-text { color: #198754; }
    .invalid-text { color: #dc3545; }
</style>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-5">

            <div class="card shadow-sm border-0 auth-card">
                <div class="card-body p-4 p-md-5">

                    <div class="text-center mb-4">
                        <div style="width:60px;height:60px;border-radius:50%;background:#f8f1f4;display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 18px;">
                            📱
                        </div>

                        <h1 class="mb-2">Complete Your Profile</h1>

                        <p class="text-muted mb-0">
                            We still need your phone number before you can book an appointment.
                        </p>
                    </div>

                    <form method="post" id="completeProfileForm" novalidate>
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label fw-semibold">Mobile Number</label>

                            <div class="input-group input-group-lg">
                                <select id="countryCode" class="form-select" style="max-width: 170px;">
                                    <option value="+356" data-country="MT" selected>🇲🇹 +356</option>
                                    <option value="+44" data-country="GB">🇬🇧 +44</option>
                                    <option value="+39" data-country="IT">🇮🇹 +39</option>
                                    <option value="+33" data-country="FR">🇫🇷 +33</option>
                                    <option value="+49" data-country="DE">🇩🇪 +49</option>
                                    <option value="+34" data-country="ES">🇪🇸 +34</option>
                                </select>

                                <input
                                    type="tel"
                                    id="localPhone"
                                    class="form-control"
                                    placeholder="99123456"
                                    required
                                >
                            </div>

                            <input type="hidden" name="phone" id="phone">

                            <div id="phoneFeedback" class="validation-message"></div>

                            {% if form.phone.errors %}
                                <div class="text-danger small mt-2">
                                    {{ form.phone.errors }}
                                </div>
                            {% endif %}
                        </div>

                        <button type="submit" class="btn btn-dark btn-lg w-100">
                            Save and Continue
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const form = document.getElementById("completeProfileForm");
    const countryCode = document.getElementById("countryCode");
    const localPhone = document.getElementById("localPhone");
    const hiddenPhone = document.getElementById("phone");
    const phoneFeedback = document.getElementById("phoneFeedback");

    function validatePhone() {
        let number = localPhone.value.replace(/\s+/g, "");
        const code = countryCode.value;
        const country = countryCode.options[countryCode.selectedIndex].dataset.country;

        let valid = false;

        if (country === "MT") {
            valid = /^[279]\d{7}$/.test(number);
        } else if (country === "GB") {
            valid = /^7\d{9}$/.test(number) || /^07\d{9}$/.test(number);
            if (number.startsWith("0")) number = number.substring(1);
        } else if (country === "IT") {
            valid = /^\d{9,10}$/.test(number);
        } else {
            valid = /^\d{6,14}$/.test(number);
        }

        if (!number) {
            phoneFeedback.textContent = "";
            return false;
        }

        if (!valid) {
            phoneFeedback.textContent = "Please enter a valid number for the selected country.";
            phoneFeedback.className = "validation-message invalid-text";
            return false;
        }

        hiddenPhone.value = code + number;

        phoneFeedback.textContent = "Phone number looks valid.";
        phoneFeedback.className = "validation-message valid-text";
        return true;
    }

    localPhone.addEventListener("input", validatePhone);
    countryCode.addEventListener("change", validatePhone);

    form.addEventListener("submit", function (event) {
        if (!validatePhone()) {
            event.preventDefault();
        }
    });
});
</script>

{% endblock %}
